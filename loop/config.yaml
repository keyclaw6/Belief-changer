# Self-improvement loop configuration — the ONLY knobs the loop reads.
# Parsed by scripts/loop/loopcfg.py (stdlib-only flat-YAML subset: scalars,
# `key: value`, and `- item` lists under a key). Keep it flat; no nesting beyond
# the one-level lists below, or the minimal parser will not understand it.
#
# Judge instrument version is pinned PER CAMPAIGN. Changing writer, judges, k,
# epsilon, the length band, or the originality threshold starts a NEW campaign
# with fresh baselines (see PROGRAM.md "campaign" rule). Do not edit this file
# between iterations to chase a score — that is an instrument change, not a
# hypothesis on a tunable asset.

campaign: factory-v2-authenticity-1
instrument_version: fac-auth-1

# --- Writer (cheap iteration) ---
# FOUNDER DECISION 2026-07-12: writer is MiniMax-M3 via OpenRouter. This
# SUPERSEDES the 2026-07-11 pin of anthropic/claude-4.6-opus (reasoning
# disabled). Cost rule: cheap writer, never-cheap judges.
writer_model: minimax/minimax-m3
writer_provider: openrouter
writer_reasoning: none

# --- Judges (strong, cross-family; NEVER MiniMax-family) ---
# Cost rule: judges are always strong models. Reuse the existing OpenRouter
# plumbing in scripts/eval/model_endpoint.py. Keep the list 3-4 wide and
# cross-family so no single house both writes and grades. If any listed judge
# ever shares a family with the writer, that is a configuration bug.
judge_models:
  - anthropic/claude-4.6-opus
  - google/gemini-3.1-pro-preview
  - openai/gpt-5.6-sol
judge_reasoning: high
# k judge calls per pair, order-swapped (must be even; half per A/B order).
k: 4

# --- Gate ---
# ACCEPT iff hard checks pass AND (reward >= last_accepted + epsilon OR first
# iteration). Epsilon default 0.03 is a PLACEHOLDER for judge noise: recalibrate
# it after 3 same-config baseline repeats actually measure the noise floor, then
# set epsilon at roughly that floor. Until then 0.03 is a guess, not a measurement.
epsilon: 0.03

# --- Hard checks ---
# Loose length sanity (NOT a style gate): each chapter within this fraction of
# its master-plan budget. Deliberately looser than the retired ±20% Stage-A gate.
length_band: 0.40
# Originality tripwire vs the reference corpus: max fraction of our n-gram
# shingles that may also appear in the reference. Inherited tested value from
# scripts/eval/repetition.py CROSS_TRIPWIRE (0.003 = 0.3%). Do not loosen.
originality_tripwire: 0.003

# --- Reference pairing ---
# The extracted GSBS corpus (calibration/reference/gsbs/) carries 2 front-matter
# segments (author bio, introduction) BEFORE real "Chapter 1". Our chapter N
# therefore pairs with reference list-position N + reference_chapter_offset.
# Verified 2026-07-12: positions 1-2 are front matter, 003-chapter-1.txt is ch 1.
reference_chapter_offset: 2

# --- Paths (relative to repo root) ---
reference_dir: calibration/reference/gsbs
reference_epub: analysis/reference-books/The easyway Good Sugar Bad Sugar.epub
scores_dir: loop/scores
results_tsv: loop/results.tsv
learnings: loop/learnings.md
pairwise_prompt: calibration/judges/factory-authenticity-pairwise.md
detection_prompt: calibration/judges/factory-detection-probe.md
