# Self-improvement loop configuration — the ONLY knobs the loop reads.
# Parsed by scripts/loop/loopcfg.py (stdlib-only flat-YAML subset: scalars,
# `key: value`, and `- item` lists under a key). Keep it flat; no nesting beyond
# the one-level lists below, or the minimal parser will not understand it.
#
# FROZEN per campaign (PROGRAM §3): the rubric, weights, judge_k, writer model,
# epsilon. Changing any of these starts a NEW campaign with fresh baselines —
# founder decision only. Do not edit this file between iterations to chase a
# score — that is an instrument change, not a hypothesis on a tunable asset.
#
# FOUNDER MODEL MATRIX (2026-07-13) — supersedes all earlier pins. The
# 2026-07-12 "MiniMax-M3 writer" note was a founder mix-up from another project
# and is RESCINDED. GPT models NEVER route through OpenRouter: Sol runs only as
# fresh native Codex subagents on the founder's OpenAI subscription. OpenRouter
# carries ONLY H-F01 Muse chapter-writing and DeepSeek research.

campaign: factory-v3-rubric-1
instrument_version: carr-likeness-rubric-1

# RF-16/RF-19 product lineage. Legacy campaign fields below remain readable.
product_effect_rubric: calibration/judges/product-effect-rubric.md
product_effect_absolute_rubric: calibration/judges/product-effect-absolute-rubric.md
causal_results_jsonl: loop/causal-bundle-results.jsonl
history_results_tsv: loop/results.tsv

# --- H-F01 writer: Muse Spark 1.1, high reasoning, via OpenRouter ---
writer_model: meta/muse-spark-1.1
writer_provider: openrouter
writer_reasoning: high
writer_endpoint: https://openrouter.ai/api/v1/chat/completions
writer_temperature: 0.7
writer_max_tokens: 16000
writer_attempts: 1
writer_allow_fallbacks: false

# --- Research: DeepSeek V4 Pro, top reasoning, via OpenRouter ---
researcher_model: deepseek/deepseek-v4-pro
researcher_provider: openrouter
researcher_reasoning: xhigh

# --- Planner: GPT-5.6 Sol, xhigh — NATIVE CODEX ONLY, never OpenRouter ---
planner_model: gpt-5.6-sol
planner_route: codex-native
planner_reasoning: xhigh

# --- Grounded reviewer: fresh GPT-5.6 Sol, xhigh — NATIVE CODEX ONLY ---
# This truth/safety/ownership audit is separate from literary development and
# must be a different family from the Meta writer.
grounded_reviewer_model: gpt-5.6-sol
grounded_reviewer_family: openai
grounded_reviewer_route: codex-native
grounded_reviewer_reasoning: xhigh

# --- Developmental reviewer: fresh GPT-5.6 Luna, max — NATIVE CODEX ONLY ---
# One reference-blind whole-opening context after grounded PASS. Luna is a
# distinct model family from both the Meta writer and Sol grounded audit.
developmental_reviewer_model: gpt-5.6-luna
developmental_reviewer_family: luna
developmental_reviewer_route: codex-native
developmental_reviewer_reasoning: max

# --- Judges: GPT-5.6 Sol, xhigh — NATIVE CODEX ONLY, never OpenRouter ---
# There is deliberately NO judge API endpoint config: score.py emits judge task
# files; the operator (or codex-native transport, when available) runs each as
# a fresh Sol subagent and saves the raw JSON verdicts. Judge output is never
# fabricated and never routed through OpenRouter.
judge_model: gpt-5.6-sol
judge_route: codex-native
judge_reasoning: xhigh
# Fresh judge contexts per chapter; dimension scores averaged across contexts.
judge_k: 2
# Rubric prompt (frozen per campaign).
judge_rubric: calibration/judges/carr-likeness-rubric.md

# --- Rubric dimension weights (must sum to 1.0; frozen per campaign) ---
weights:
  - voice_certainty: 0.20
  - method_execution: 0.20
  - structure_anatomy: 0.15
  - repetition_mantra: 0.15
  - emotional_register: 0.15
  - rhythm_texture: 0.15

# --- Gate ---
# ACCEPT iff hard checks pass AND (reward >= best_accepted - epsilon; strictly
# greater sets NEW-BEST). Epsilon 0.03 is a PLACEHOLDER for judge noise:
# after three same-config baseline repeats measure the real noise floor, the
# founder resets it.
epsilon: 0.03

# --- Hard checks ---
# Loose length sanity (NOT a style gate): each chapter within this fraction of
# its master-plan budget. Deliberately looser than the retired ±20% Stage-A gate.
length_band: 0.40
# Originality tripwire vs the reference corpus: max fraction of our n-gram
# shingles that may also appear in the reference. Inherited tested value from
# scripts/eval/repetition.py CROSS_TRIPWIRE (0.003 = 0.3%). Do not loosen.
originality_tripwire: 0.003

# --- Reference pairing ---
# The extracted GSBS corpus (calibration/reference/gsbs/) carries 2 front-matter
# segments (author bio, introduction) BEFORE real "Chapter 1". Our chapter N
# therefore pairs with reference list-position N + reference_chapter_offset.
# Verified 2026-07-12: positions 1-2 are front matter, 003-chapter-1.txt is ch 1.
reference_chapter_offset: 2

# --- Paths (relative to repo root) ---
reference_dir: calibration/reference/gsbs
reference_epub: analysis/reference-books/The easyway Good Sugar Bad Sugar.epub
scores_dir: loop/scores
results_tsv: loop/results.tsv
learnings: loop/learnings.md
tasks_dir: loop/iterations

# Near-copy tripwire (review finding C4): word-sequence similarity (difflib
# ratio, whole chapter vs its matched reference chapter). Catches paraphrase-
# spaced copying that defeats exact 12-gram shingles — a near-copy with one
# token edited every ~11 words still scores ~0.9 here; genuinely original
# same-topic prose sits far below 0.5. Hard gate; do not loosen.
near_copy_tripwire: 0.5
